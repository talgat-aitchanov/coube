services:
  postgres:
    image: postgres:16-alpine
    container_name: coube-postgres
    environment:
      POSTGRES_DB: coube
      POSTGRES_USER: coube
      POSTGRES_PASSWORD: coube
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U coube -d coube" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
